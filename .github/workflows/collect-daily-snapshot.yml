name: Collect Daily Snapshot

on:
  schedule:
    # Every day at 08:43 UTC (offset from :00 to reduce fleet contention)
    - cron: "43 8 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  collect-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run daily snapshot collector
        run: uv run python collect_daily_snapshot.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/timeseries/roblox_daily_snapshot.csv data/timeseries/collection_log.json
          if git diff --staged --quiet; then
            echo "No new data to commit"
          else
            git commit -m "chore: daily snapshot $(date -u +%Y-%m-%d)"
            git push
          fi
