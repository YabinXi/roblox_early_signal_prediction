name: Collect YouTube Weekly Timeseries

on:
  schedule:
    # Every Monday at 09:07 UTC (offset from :00 to reduce fleet contention)
    - cron: "7 9 * * 1"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  collect-youtube:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run YouTube weekly collector
        run: uv run python collect_youtube_timeseries.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/timeseries/youtube_weekly.csv data/timeseries/youtube_collection_log.json
          if git diff --staged --quiet; then
            echo "No new data to commit"
          else
            git commit -m "chore: YouTube weekly snapshot $(date -u +%Y-W%V)"
            git push
          fi
